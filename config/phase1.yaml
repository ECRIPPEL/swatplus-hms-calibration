# ==============================================================================
# PHASE 1 CONFIG — Annual water balance (soft calibration)
# ==============================================================================

phase: 1
script_version: "phase1"

# --- Paths and execution ---
project_path: "C:/path/to/your/swatplus/txtinout"
start_date: "1979-01-01"
end_date: "1980-12-31"
warmup: 1
threads: 16
seed: 123
channel_exutorio: 33

# --- GSA settings ---
gsa:
  prefix: "GSA_phase1_v"
  m_traj: 2
  delta: 0.20

# --- Calibration settings ---
cal:
  prefix: "SOFT_phase1_v"
  n_simulations: 30
  type: "soft"                  # soft = behavioural filtering; hard = NSE/KGE/PBIAS
  start_date: "1979-01-01"      # calibration can use longer period
  end_date: "1980-12-31"
  warmup: 1

  # soft calibration thresholds
  threshold_pct: 25             # max relative error per component (%)

  # observed targets for water balance
  targets:
    et_rto: 0.48147
    wyld_rto: 0.51853
    bfi: 0.464

# --- Observed data (for monthly streamflow diagnostics in soft calibration) ---
obs_files:
  monthly: "obs_flow_mon.csv"
  daily: "obs_flow_daily.csv"
obs_start_date: "1980-01-01"

# --- SWAT+ outputs for GSA ---
gsa_outputs:
  precip:
    file: "basin_wb_aa"
    variable: "precip"
    unit: 1
  et:
    file: "basin_wb_aa"
    variable: "et"
    unit: 1
  surq:
    file: "basin_wb_aa"
    variable: "surq_gen"
    unit: 1
  latq:
    file: "basin_wb_aa"
    variable: "latq"
    unit: 1
  gw_q:
    file: "basin_aqu_aa"
    variable: "flo"
    unit: 1

# --- SWAT+ outputs for calibration ---
cal_outputs:
  vazao_exutorio:
    file: "channel_sdmorph_mon"
    variable: "flo_out"
    unit: 33
  precip:
    file: "basin_wb_aa"
    variable: "precip"
    unit: 1
  et:
    file: "basin_wb_aa"
    variable: "et"
    unit: 1
  wateryld:
    file: "basin_wb_aa"
    variable: "wateryld"
    unit: 1
  baseflow:
    file: "basin_aqu_aa"
    variable: "flo_cha"
    unit: 1

# --- GSA observed targets (annual ratios) ---
gsa_targets:
  q_p: 0.5185
  et_p: 0.4814
  bfi: 0.464

# --- GSA metrics to compute EE ---
gsa_metrics:
  - "q_p"
  - "et_p"
  - "bfi"
  - "obj_total"

# --- Parameters ---
parameters:
  - short: "cn2"
    par_name: "cn2::cn2.hru | change = pctchg"
    min: -25
    max: 25
  - short: "awc"
    par_name: "awc::awc.sol | change = pctchg"
    min: -25
    max: 25
  - short: "esco"
    par_name: "esco::esco.hru | change = absval"
    min: 0.01
    max: 1.00
  - short: "epco"
    par_name: "epco::epco.hru | change = absval"
    min: 0.01
    max: 1.00
  - short: "perco"
    par_name: "perco::perco.hru | change = absval"
    min: 0.01
    max: 1.00
  - short: "canmx"
    par_name: "canmx::canmx.hru | change = absval"
    min: 0.0
    max: 10.0
  - short: "harv_idx"
    par_name: "harv_idx::harv_idx.plt | change = absval"
    min: 0.30
    max: 0.60
  - short: "lai_pot"
    par_name: "lai_pot::lai_pot.plt | change = pctchg"
    min: -20
    max: 20
  - short: "latq_co"
    par_name: "latq_co::latq_co.hru | change = absval"
    min: 0.01
    max: 1.00
  - short: "petco"
    par_name: "petco::petco.hru | change = absval"
    min: 0.80
    max: 1.20
  - short: "revap_co"
    par_name: "revap_co::revap_co.aqu | change = absval"
    min: 0.00
    max: 0.40
  - short: "cn3_swf"
    par_name: "cn3_swf::cn3_swf.hru | change = absval"
    min: 0.00
    max: 1.00

# --- Extra calibration parameters (added in CAL but not in GSA) ---
cal_extra_params:
  - short: "flo_min"
    par_name: "flo_min::flo_min.aqu | change = absval"
    min: 0.00
    max: 3.00
  - short: "bf_max"
    par_name: "bf_max::bf_max.aqu | change = absval"
    min: 0.10
    max: 1.50
  - short: "revap_min"
    par_name: "revap_min::revap_min.aqu | change = absval"
    min: 0.00
    max: 2.00

# --- Check parameter range (Phase 1 only) ---
check_range:
  enabled: true
  source_files:
    soils_sol:
      vars: ["dp","bd","awc","soil_k","carbon","clay","silt","sand","rock","alb","usle_k","ec","caco3","ph"]
    hydrology_hyd:
      vars: ["lat_ttime","lat_sed","can_max","esco","epco","orgn_enrich","orgp_enrich","cn3_swf","bio_mix","perco","lat_orgn","lat_orgp","pet_co","latq_co"]
    topography_hyd:
      vars: ["slp","slp_len","lat_len","dist_cha","depos"]
  map:
    - short: "awc"
      source_file: "soils.sol"
      source_var: "awc"
      cal_name: "awc"
      cal_obj_typ: "sol"
    - short: "canmx"
      source_file: "hydrology.hyd"
      source_var: "can_max"
      cal_name: "canmx"
      cal_obj_typ: "hru"
    - short: "esco"
      source_file: "hydrology.hyd"
      source_var: "esco"
      cal_name: "esco"
      cal_obj_typ: "hru"
    - short: "epco"
      source_file: "hydrology.hyd"
      source_var: "epco"
      cal_name: "epco"
      cal_obj_typ: "hru"
    - short: "perco"
      source_file: "hydrology.hyd"
      source_var: "perco"
      cal_name: "perco"
      cal_obj_typ: "hru"
    - short: "petco"
      source_file: "hydrology.hyd"
      source_var: "pet_co"
      cal_name: "petco"
      cal_obj_typ: "hru"
    - short: "latq_co"
      source_file: "hydrology.hyd"
      source_var: "latq_co"
      cal_name: "latq_co"
      cal_obj_typ: "hru"
    - short: "cn3_swf"
      source_file: "hydrology.hyd"
      source_var: "cn3_swf"
      cal_name: "cn3_swf"
      cal_obj_typ: "hru"
