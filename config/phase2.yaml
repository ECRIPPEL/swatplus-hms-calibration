# ==============================================================================
# PHASE 2 CONFIG — Monthly streamflow (hard calibration)
# ==============================================================================

phase: 2
script_version: "phase2"

# --- Paths and execution ---
project_path: "C:/path/to/your/swatplus/txtinout"
start_date: "1979-01-01"
end_date: "1980-12-31"
warmup: 1
threads: 16
seed: 123
channel_exutorio: 33

# --- GSA settings ---
gsa:
  prefix: "GSA_phase2_v"
  m_traj: 2
  delta: 0.20

# --- Calibration settings ---
cal:
  prefix: "HARD_phase2_v"
  n_simulations: 30
  type: "hard"
  start_date: "1979-01-01"
  end_date: "1980-12-31"
  warmup: 1

  # hard calibration thresholds (Moriasi et al. 2015 — GOOD)
  threshold_nse: 0.70
  threshold_kge: 0.70
  threshold_abs_pbias: 10

# --- Observed data ---
obs_files:
  monthly: "obs_flow_mon.csv"
  daily: "obs_flow_daily.csv"
obs_start_date: "1980-01-01"

# --- SWAT+ outputs for GSA ---
gsa_outputs:
  vazao_exutorio:
    file: "channel_sdmorph_mon"
    variable: "flo_out"
    unit: 33

# --- SWAT+ outputs for calibration ---
cal_outputs:
  vazao_exutorio_mon:
    file: "channel_sdmorph_mon"
    variable: "flo_out"
    unit: 33
  vazao_exutorio_day:
    file: "channel_sdmorph_day"
    variable: "flo_out"
    unit: 33

# --- GSA metrics to compute EE ---
gsa_metrics:
  - "NSE_mon"
  - "KGE_mon"
  - "PBIAS_mon"
  - "obj_total"

# --- Temporal scale ---
temporal_scale: "monthly"
metric_suffix: "_mon"

# --- Inherited ranges ---
inherit:
  from_prefix: "SOFT_phase1_v"
  ranges_file: "novos_ranges_phase2_from_morris_behavioral.csv"

# --- Parameter mapping (short -> SWATrunR notation) ---
param_map:
  cn2: "cn2::cn2.hru | change = pctchg"
  awc: "awc::awc.sol | change = pctchg"
  esco: "esco::esco.hru | change = absval"
  epco: "epco::epco.hru | change = absval"
  perco: "perco::perco.hru | change = absval"
  canmx: "canmx::canmx.hru | change = absval"
  latq_co: "latq_co::latq_co.hru | change = absval"
  petco: "petco::petco.hru | change = absval"
  revap_co: "revap_co::revap_co.aqu | change = absval"
  cn3_swf: "cn3_swf::cn3_swf.hru | change = absval"
  flo_min: "flo_min::flo_min.aqu | change = absval"
  bf_max: "bf_max::bf_max.aqu | change = absval"
  revap_min: "revap_min::revap_min.aqu | change = absval"

# --- Check parameter range ---
check_range:
  enabled: false
