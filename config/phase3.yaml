# ==============================================================================
# PHASE 3 CONFIG — Daily streamflow (hard calibration)
# ==============================================================================

phase: 3
script_version: "phase3"

# --- Paths and execution ---
project_path: "C:/path/to/your/swatplus/txtinout"
start_date: "1979-01-01"
end_date: "1980-12-31"
warmup: 1
threads: 16
seed: 123
channel_exutorio: 33

# --- GSA settings (shorter period for testing) ---
gsa:
  prefix: "GSA_phase3_v"
  m_traj: 2
  delta: 0.20
  start_date: "1979-01-01"
  end_date: "1980-12-31"
  warmup: 1

# --- Calibration settings ---
cal:
  prefix: "HARD_phase3_v"
  n_simulations: 30
  type: "hard"
  start_date: "1979-01-01"
  end_date: "1980-12-31"
  warmup: 1

  # hard calibration thresholds (daily — Moriasi et al. 2015)
  threshold_nse: 0.50
  threshold_kge: 0.50
  threshold_abs_pbias: 15

# --- Diagnostic targets inherited from Phase 1 ---
diagnostic_balance:
  et_rto: 0.48147
  wyld_rto: 0.51853
  threshold_pct: 15

# --- Observed data ---
obs_files:
  monthly: "obs_flow_mon.csv"
  daily: "obs_flow_daily.csv"
obs_start_date: "1980-01-01"

# --- SWAT+ outputs for GSA ---
gsa_outputs:
  vazao_exutorio:
    file: "channel_sdmorph_day"
    variable: "flo_out"
    unit: 33

# --- SWAT+ outputs for calibration ---
cal_outputs:
  vazao_exutorio_day:
    file: "channel_sdmorph_day"
    variable: "flo_out"
    unit: 33
  vazao_exutorio_mon:
    file: "channel_sdmorph_mon"
    variable: "flo_out"
    unit: 33
  precip:
    file: "basin_wb_aa"
    variable: "precip"
    unit: 1
  et:
    file: "basin_wb_aa"
    variable: "et"
    unit: 1
  wateryld:
    file: "basin_wb_aa"
    variable: "wateryld"
    unit: 1

# --- GSA metrics to compute EE ---
gsa_metrics:
  - "NSE_day"
  - "KGE_day"
  - "PBIAS_day"
  - "obj_total"

# --- Temporal scale ---
temporal_scale: "daily"
metric_suffix: "_day"

# --- Inherited ranges ---
inherit:
  from_prefix: "HARD_phase2_v"
  ranges_file: "novos_ranges_phase3_from_hard_phase2.csv"

# --- Parameter mapping ---
param_map:
  cn2: "cn2::cn2.hru | change = pctchg"
  awc: "awc::awc.sol | change = pctchg"
  esco: "esco::esco.hru | change = absval"
  epco: "epco::epco.hru | change = absval"
  perco: "perco::perco.hru | change = absval"
  canmx: "canmx::canmx.hru | change = absval"
  latq_co: "latq_co::latq_co.hru | change = absval"
  petco: "petco::petco.hru | change = absval"
  revap_co: "revap_co::revap_co.aqu | change = absval"
  cn3_swf: "cn3_swf::cn3_swf.hru | change = absval"
  flo_min: "flo_min::flo_min.aqu | change = absval"
  bf_max: "bf_max::bf_max.aqu | change = absval"
  revap_min: "revap_min::revap_min.aqu | change = absval"
  surlag: "surlag::surlag.bsn | change = absval"
  lattime: "lat_ttime::lat_ttime.hru | change = absval"
  chn: "chn::chn.rte | change = absval"
  ovn: "ovn::ovn.hru | change = pctchg"

# --- Extra parameters (added in Phase 3, not inherited) ---
extra_params:
  - short: "surlag"
    par_name: "surlag::surlag.bsn | change = absval"
    min: 1
    max: 24
  - short: "lattime"
    par_name: "lat_ttime::lat_ttime.hru | change = absval"
    min: 0
    max: 180
  - short: "chn"
    par_name: "chn::chn.rte | change = absval"
    min: 0.02
    max: 0.07
  - short: "ovn"
    par_name: "ovn::ovn.hru | change = pctchg"
    min: -50
    max: 50

# --- Check parameter range ---
check_range:
  enabled: false
